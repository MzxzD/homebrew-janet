name: Audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew
        run: |
          echo "$HOME/homebrew/bin" >> $GITHUB_PATH
          echo 'eval "$($HOME/homebrew/bin/brew shellenv)"' >> $GITHUB_ENV
      - name: Install Homebrew
        run: |
          git clone --depth 1 https://github.com/Homebrew/brew $HOME/homebrew
          eval "$($HOME/homebrew/bin/brew shellenv)"
          brew update
      - name: Add tap
        run: brew tap ${{ github.repository_owner }}/janet ${{ github.workspace }}
      - name: Audit formulae
        run: |
          brew audit ${{ github.repository_owner }}/janet/janet-peer --strict
          brew audit ${{ github.repository_owner }}/janet/janet-arm64-toolchain --strict
          brew audit ${{ github.repository_owner }}/janet/janet-seed --strict
          brew audit ${{ github.repository_owner }}/janet/janet --strict
